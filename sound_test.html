<!DOCTYPE html>
<html lang="zh-tw">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="SmartPhonics英語字母拼讀" />
    <title>SmartPhonics英語字母拼讀</title>
    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="Content/image/favicon.ico"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="Content/css/bootstrap-5.1.1.min.css"
    />

    <!-- this page widgets CSS -->

    <!-- my core CSS -->
    <link rel="stylesheet" href="Content/css/SPhonics.css" />
  </head>

  <body>
    <header>
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img
              src="Content/image/logo/logo.svg"
              alt="SmartPhonics|英語字母拼讀"
            />
          </a>
        </div>
      </nav>
      <div class="nav_name">
        <a href="#" class="nav_name_link">王美美</a>
        <ul class="nav_name_menu">
          <li class="text-center">
            <a href="">登出</a>
          </li>
        </ul>
      </div>
    </header>
    <!-- ------- ------- ------- ------- ------- ------- ------- -->
    <main>
      <div class="sound_test_area">
        <div class="leave_next_btn leave_btn_area">
            <button class="leave_btn">
                <p>
                    離開
                </p>
              </button>
        </div>
        <div class="sound_test_text">
          <p>
            請在安靜的地方戴上耳機，點中間按鈕， 確認自己聽到音樂；
            若你沒有聽到音樂，請檢查自己的耳機!
          </p>
        </div>
        <div class="sound_bar_area play_animation"> <!-- 播放時class加入"play_animation" -->
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
        <div class="sound_play_area">
          <button class="play_area">
            <i class="fa-solid fa-volume-high"></i>
          </button>
        </div>
        <div class="sound_test_img">
            <img src="Content/image/photo/avatar/test.png" alt="">
        </div>
        <div class="leave_next_btn go_btn_area">
            <button class="go_btn">
                <p>
                    GO
                </p>
              </button>
        </div>
      </div>
    </main>

    <!-- ------- ------- ------- ------- ------- ------- ------- -->
    <footer class="footer"></footer>
    <!-- ------- ------- ------- ------- ------- ------- ------- -->

    <!-- this page widgets CSS -->
    <script src="Content/js/range.js"></script>

    <script src="Content/js/jquery-3.5.1.min.js"></script>
    <script src="Content/js/bootstrap-5.1.1.min.js"></script>
    <script
      src="Content/js/fontawesome-free-6.1.1.min.js"
      crossorigin="anonymous"
    ></script>

    <!-- 顯示登出按鈕 -->
    <script>
      $(".nav_name").click(function () {
        $(".nav_name_menu").toggle();
      });
    </script>
  </body>
</html>
