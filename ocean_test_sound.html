<!DOCTYPE html>
<html lang="zh-tw">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="SmartPhonics英語字母拼讀" />
  <title>SmartPhonics英語字母拼讀</title>
  <link rel="shortcut icon" type="image/x-icon" href="Content/image/favicon.ico" />
  <link rel="stylesheet" type="text/css" href="Content/css/bootstrap-5.1.1.min.css" />

  <!-- this page widgets CSS -->

  <!-- my core CSS -->
  <link rel="stylesheet" href="Content/css/SPhonics.css" />
</head>

<body>
  <header>
  </header>
  <!-- ------- ------- ------- ------- ------- ------- ------- -->
  <main>
    <div class="sound_test_area">
      <div class="leave_next_btn leave_btn_area">
        <button class="leave_btn">
          <a href="pick_level.html">
            返回
          </a>
        </button>
      </div>
      <div class="sound_test_text">
        <p>
          請在安靜的地方戴上耳機，點錄音按鈕，<br/>
          對著麥克風說話後，再點停止按鈕。接著，點按播放按鈕聽自己說話的聲音，<br/>
          若你沒有聽到聲音，請檢查自己的耳機和麥克風!
        </p>
      </div>
      <div class="sound_play_area">
        <button class="play_area">
          <i class="fa-solid fa-microphone-lines"></i>
          <div class="finger_icon" style="display: none;">
            <!-- 10秒後未按下「播放」鍵在顯示 -->
            <i class="fa-solid fa-hand-point-right"></i>
          </div>
        </button>
      </div>
      <div class="sound_test_img">
        <img src="Content/image/photo/avatar/figure/level_ocean_kid.png" alt="">
      </div>
      <div class="leave_next_btn go_btn_area">
        <button class="go_btn">
          <!-- 聲音播放class加上"button_glow" -->
          <a href="land_test_sound_test_animation.html">
            GO&ensp;<i class="fa-solid fa-arrow-right-long"></i>
          </a>
        </button>
      </div>
    </div>
  </main>

  <!-- ------- ------- ------- ------- ------- ------- ------- -->
  <footer class="footer"></footer>
  <!-- ------- ------- ------- ------- ------- ------- ------- -->

  <!-- this page widgets CSS -->
  <script src="Content/js/range.js"></script>

  <script src="Content/js/jquery-3.5.1.min.js"></script>
  <script src="Content/js/bootstrap-5.1.1.min.js"></script>
  <script src="Content/js/fontawesome-free-6.1.1.min.js" crossorigin="anonymous"></script>

  <script>
    $(document).ready(function () {
      $('header').load('header.html');
    });
  </script>

  <!-- 顯示登出按鈕 -->
  <script>
    $(".nav_name").click(function () {
      $(".nav_name_menu").toggle();
    });
  </script>
</body>

</html>
